<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Спасибо — INK LAB</title>
<link rel="icon" type="image/png" href="/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #080808;
    color: #f8f5f0;
    font-family: 'Montserrat', sans-serif;
    font-weight: 400;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }
  .content {
    position: relative;
    z-index: 1;
    max-width: 600px;
    opacity: 0;
    transform: translateY(30px);
    animation: fadeUp 1s ease 0.3s forwards;
  }
  .logo {
    width: 60px;
    margin-bottom: 3rem;
    filter: drop-shadow(0 0 20px rgba(255,107,53,0.3));
  }
  .eyebrow {
    font-size: 0.6rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    background: linear-gradient(90deg, #ff6b35, #ff3d7f);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 2rem;
  }
  .title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(3rem, 8vw, 6rem);
    font-weight: 300;
    line-height: 1;
    margin-bottom: 2rem;
  }
  .title em {
    font-style: italic;
    background: linear-gradient(90deg, #ff6b35, #ff3d7f);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .text {
    font-size: 0.85rem;
    line-height: 2;
    opacity: 0.6;
    margin-bottom: 3rem;
    max-width: 400px;
    margin-left: auto;
    margin-right: auto;
  }
  .btn {
    display: inline-block;
    padding: 1.2rem 3rem;
    background: linear-gradient(90deg, #ff6b35, #ff3d7f);
    color: #f8f5f0;
    text-decoration: none;
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    font-weight: 500;
    transition: all 0.3s;
    margin: 0.5rem;
  }
  .btn:hover { opacity: 0.85; transform: translateY(-2px); }
  .btn-outline {
    display: inline-block;
    padding: 1.2rem 3rem;
    border: 1px solid rgba(255,255,255,0.2);
    color: #f8f5f0;
    text-decoration: none;
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    transition: all 0.3s;
    margin: 0.5rem;
  }
  .btn-outline:hover { border-color: #ff6b35; color: #ff6b35; }
  .divider {
    width: 1px;
    height: 60px;
    background: linear-gradient(to bottom, transparent, rgba(255,107,53,0.5), transparent);
    margin: 3rem auto;
  }
  .bottom-text {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: 0.3;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="content">
  <img src="/logo.png" alt="INK LAB" class="logo">
  <div class="eyebrow">INK LAB School</div>
  <h1 class="title">Спасибо!<br><em>Мы свяжемся</em></h1>
  <p class="text">Твоя заявка принята. Мы напишем тебе в ближайшее время и расскажем всё о старте курса. Следующий поток начинается 1 июля 🖤</p>
  <a href="https://t.me/INKLABSCHOOLBOT" target="_blank" class="btn">Открыть бота</a>
  <a href="/" class="btn-outline">На главную</a>
  <div class="divider"></div>
  <div class="bottom-text">INK LAB — Школа тату-мастерства</div>
</div>
</body>
</html>
